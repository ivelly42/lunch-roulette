<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>점심 룰렌</title>
<style>
:root{--bg:#0b0c10;--fg:#eaf0f6;--card:rgba(255,255,255,.03);--border:rgba(255,255,255,.14);--muted:rgba(234,240,246,.7);--accent:#f15a24}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg)}
.wrap{max-width:1000px;margin:0 auto;padding:18px}
.hero{padding:14px 12px 2px}
.hero-title{font-size:24px;font-weight:800;line-height:1.25;white-space:pre-line}
.hero-sub{margin-top:8px;color:var(--muted);font-size:14px}
.card{border:1px solid var(--border);background:var(--card);border-radius:18px;padding:16px;margin-top:12px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
button{cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--fg);border-radius:999px;padding:10px 14px;font-size:14px}
button.primary{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:800}
button:disabled{opacity:.55;cursor:not-allowed}
.small{font-size:13px}
.muted{color:var(--muted)}
.tag{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:999px;padding:6px 10px;margin:3px 6px 3px 0;background:rgba(255,255,255,.04)}
.tag .x{cursor:pointer;opacity:.85;font-weight:900}
.panel{margin-top:12px}
.wheel{height:170px;display:flex;align-items:center;justify-content:center;border:1px dashed var(--border);border-radius:18px}
.result-name{font-size:22px;font-weight:900;margin-top:4px}
.result-meta{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-title">최후의 만찮
운명의 원판이 깨어난다</div>
    <div class="hero-sub small">망설임을 거두어라. 룰렌은 조건에 맞는 식당만 남겨 돌린다.</div>
  </div>

  <div class="card" id="home">
    <div class="row">
      <button class="primary" id="startBtn">운명의 시간 시작</button>
      <button id="cfgBtn">조건 설정</button>
      <button id="quickBtn">빠른길로 결과 보기</button>
    </div>
    <div class="small muted" style="margin-top:10px;"> 현재 선택지 <span id="count">-</span></div>
    <div class="panel" id="summary"></div>
  </div>

  <div class="card" id="cfgPanel" style="display:none;">
    <div class="row">
      <button id="soloBtn">혼밥 가능만</button>
      <button id="resetAllBtn">전체 초기화</button>
      <button class="primary" id="closeCfg">닫기</button>
    </div>
    <div class="small muted" style="margin-top:12px;">카테고리</div>
    <div class="panel row" id="catRow"></div>
    <div class="small muted" style="margin-top:12px;">제외(클릭시 제외됨)</div>
    <div class="panel row" id="excludeRow" style="max-height:260px;overflow:auto;"></div>
  </div>

  <div class="card" id="wheel" style="display:none;">
    <div class="wheel">
      <div>
        <div class="small muted">회전 중...</div>
        <div id="wheelName" class="result-name"></div>
      </div>
    </div>
  </div>

  <div class="card" id="result" style="display:none;">
    <div class="result-name" id="resName"></div>
    <div class="result-meta" id="resMeta"></div>

    <div class="row" style="margin-top:10px;">
      <button class="primary" id="menuBtn">메뉴판 보기</button>
      <button id="copyBtn">결과 복사</button>
      <button id="backBtn">처음으로</button>
    </div>
  </div>
</div>

<script>
let all=[], list=[];
const state={cat:"전체", solo:false, exc:new Set()};
const $=id=>document.getElementById(id);
const menuUrl=name=>"https://map.naver.com/v5/search/"+encodeURIComponent(name+" 메뉴");

function apply(){
  list=all.filter(r=>{
    if(state.cat!=="전체" && r.category!==state.cat) return false;
    if(state.exc.has(r.id)) return false;
    if(state.solo && r.soloFriendly===false) return false;
    return true;
  });
  $("count").textContent=`${list.length} / ${all.length}`;
  renderSummary();
  renderCats();
  renderExclude();
}

function renderSummary(){
  const s=$("summary");
  s.innerHTML="";
  [
    ["카테고리", state.cat, ()=>{ state.cat="전체"; apply(); }],
    ["혼밥", state.solo?"ON":"OFF", ()=>{ state.solo=false; apply(); }],
    ["제외", `${state.exc.size}개`, ()=>{ state.exc.clear(); apply(); }]
  ].forEach(([k,v,fn])=>{
    const t=document.createElement("span");
    t.className="tag";
    t.innerHTML=`<span class="muted">${k}</span> ${v} <span class="x">✕</span>`;
    t.querySelector(".x").onclick=fn;
    s.appendChild(t);
  });
}

function renderCats(){
  const row=$("catRow");
  if(row.children.length) return;
  const cats=new Set(["전체"]);
  all.forEach(r=>cats.add(r.category||"기타"));
  [...cats].forEach(c=>{
    const b=document.createElement("button");
    b.textContent=c;
    b.onclick=()=>{ state.cat=c; apply(); };
    row.appendChild(b);
  });
}

function renderExclude(){
  const row=$("excludeRow");
  row.innerHTML="";
  all.forEach(r=>{
    const b=document.createElement("button");
    b.textContent=r.name;
    b.onclick=()=>{ state.exc.add(r.id); apply(); };
    row.appendChild(b);
  });
}

function pick(){ return list[Math.floor(Math.random()*list.length)] || null; }

function showCard(which){
  $("cfgPanel").style.display = which==="cfg" ? "" : "none";
  $("wheel").style.display = which==="wheel" ? "" : "none";
  $("result").style.display = which==="res" ? "" : "none";
}

async function spin(){
  if(!list.length){ alert("선택지가 없습니다"); return; }
  showCard("wheel");
  for(let i=0;i<18;i++){
    const r=pick();
    if(!r) break;
    $("wheelName").textContent=r.name;
    await new Promise(res=>setTimeout(res, 90 + i*12));
  }
  show(pick());
}

function show(r){
  if(!r) return;
  showCard("res");
  $("resName").textContent=r.name;
  $("resMeta").textContent=r.category||"";
  $("menuBtn").onclick=()=>window.open(r.menuUrl||menuUrl(r.name), "_blank");
  $("copyBtn").onclick=async ()=>{
    const t=`[점심 결과] ${r.name}\n- ${r.category||""}\n- 메뉴판: ${r.menuUrl||menuUrl(r.name)}`;
    try{ await navigator.clipboard.writeText(t); } catch{ prompt("복사해주세요", t); }
  };
}

$("startBtn").onclick=spin;
$("quickBtn").onclick=()=>show(pick());
$("cfgBtn").onclick=()=>showCard("cfg");
$("closeCfg").onclick=()=>showCard();
$("resetAllBtn").onclick=()=>{ state.cat="전체"; state.solo=false; state.exc.clear(); apply(); };
$("soloBtn").onclick=()=>{ state.solo=!state.solo; apply(); };
$("backBtn").onclick=()=>showCard();

fetch("restaurants.json").then(r=>r.json()).then(a=>{ all=a; apply(); });
</script>
</body>
</html>
