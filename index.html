<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>점심 룰렛</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin:0; background:#0b0c10; color:#eaf0f6; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px; }
    .card { border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); border-radius: 16px; padding: 16px; margin-top: 12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    button { cursor:pointer; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05);
      color:#eaf0f6; border-radius: 12px; padding: 10px 12px; }
    button.primary { background: #f15a24; border-color:#f15a24; color:#0b0c10; }
    button:disabled { opacity: 0.5; cursor:not-allowed; }
    .tag { display:inline-flex; align-items:center; gap:8px; border:1px solid rgba(255,255,255,0.2);
      border-radius: 999px; padding: 6px 10px; font-size: 13px; background: rgba(255,255,255,0.04); }
    .tag .x { opacity:0.8; cursor:pointer; font-weight:700; }
    .big { font-size: 18px; font-weight: 750; }
    .small { font-size: 13px; opacity: 0.85; }
    .muted { opacity:0.7; }
    .wheel { height: 180px; display:flex; align-items:center; justify-content:center; border:1px dashed rgba(255,255,255,0.2);
      border-radius: 16px; margin-top: 10px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="big">최후의 만찬<br/>운명의 원판이 깨어난다</div>
    <div class="small muted">조건에 맞는 식당만 남겨 돌린다.</div>
    <div class="row" style="margin-top:12px;">
      <button class="primary" id="startBtn">운명의 시간 시작</button>
      <button id="cfgBtn">조건 설정</button>
      <button id="quickBtn">빠르게 결과 보기</button>
    </div>
    <div style="margin-top:12px;">
      <div class="small muted">현재: <span id="count">-</span></div>
      <div class="row" id="summary" style="margin-top:8px;"></div>
    </div>
  </div>

  <div class="card" id="cfgPanel" style="display:none;">
    <div class="big">조건 설정</div>
    <div class="row" style="margin-top:10px;">
      <button id="resetBtn">조건 초기화</button>
      <button class="primary" id="closeCfg">닫기</button>
    </div>
    <div class="small muted" style="margin-top:10px;">카테고리</div>
    <div class="row" id="catRow" style="margin-top:6px;"></div>
    <div class="small muted" style="margin-top:10px;">제외(식당명 클릭)</div>
    <div class="row" id="excludeRow" style="margin-top:6px;"></div>
  </div>

  <div class="card" id="wheelPanel" style="display:none;">
    <div class="big">룰렛</div>
    <div class="wheel">
      <div>
        <div class="small muted">회전 중...</div>
        <div id="wheelName" class="big"></div>
      </div>
    </div>
  </div>

  <div class="card" id="resultPanel" style="display:none;">
    <div class="big">결과</div>
    <div id="resultName" class="big" style="margin-top:8px;"></div>
    <div id="resultMeta" class="small muted"></div>

    <div class="row" style="margin-top:10px;">
      <button class="primary" id="menuBtn">메뉴판 보기</button>
      <button id="copyBtn">결과 텍스트 복사</button>
      <button id="backHome">처음으로</button>
    </div>
  </div>
</div>

<script>
  let raw = [], filt = [];
  const state = {
    category: '전체',
    excludedIds: new Set(),
  };

  async function load() {
    const res = await fetch('restaurants.json');
    raw = await res.json();
    computeCats();
    apply();
  }

  function computeCats() {
    const cats = new Set(['전체']);
    raw.forEach(r => cats.add(r.category || '기타'));
    const row = document.getElementById('catRow');
    row.innerHTML = '';
    [...cats].forEach(cat => {
      const btn = document.createElement('button');
      btn.textContent = cat;
      btn.onclick = () => { state.category = cat; apply(); };
      row.appendChild(btn);
    });
  }

  function apply() {
    filt = raw.filter(r => {
      if (state.category !== '전체' && r.category !== state.category) return false;
      if (state.excludedIds.has(r.id)) return false;
      return true;
    });
    document.getElementById('count').textContent = `${filt.length}/${raw.length}`;
    renderSummary();
    renderExclude();
  }

  function renderSummary() {
    const p = document.getElementById('summary');
    p.innerHTML = '';
    const tags = [
      ['카테고리', state.category, () => { state.category = '전체'; apply(); }],
      ['제외', `${state.excludedIds.size}개`, () => { state.excludedIds.clear(); apply(); }],
    ];
    tags.forEach(([k,v,fn]) => {
      const d = document.createElement('span');
      d.className = 'tag';
      d.innerHTML = `<span class="muted">${k}</span> ${v} <span class="x">✕</span>`;
      d.querySelector('.x').onclick = fn;
      p.appendChild(d);
    });
  }

  function renderExclude() {
    const row = document.getElementById('excludeRow');
    row.innerHTML = '';
    raw.forEach(r => {
      const btn = document.createElement('button');
      btn.textContent = r.name;
      btn.onclick = () => { state.excludedIds.add(r.id); apply(); };
      row.appendChild(btn);
    });
  }

  const show = (id,v) => document.getElementById(id).style.display = v ? '' : 'none';

  document.getElementById('cfgBtn').onclick = () => show('cfgPanel', true);
  document.getElementById('closeCfg').onclick = () => show('cfgPanel', false);
  document.getElementById('resetBtn').onclick = () => { state.category='전체'; state.excludedIds.clear(); apply(); };

  function rand() { return filt[Math.floor(Math.random()*filt.length)] || null; }

  let spinning = false;
  async function spinAndResult() {
    if (spinning) return;
    spinning = true;
    show('resultPanel', false);
    show('wheelPanel', true);
    document.getElementById('wheelName').textContent = '...';

    for (let i=0;i<12;i++) {
      const r=rand(); if (!r) break;
      document.getElementById('wheelName').textContent = r.name;
      await new Promise(res => setTimeout(res, 120 + i*20));
    }

    show('wheelPanel', false);
    const r = rand();
    if (!r) { alert('선택지가 없습니다'); spinning=false; return; }
    renderResult(r);
    spinning=false;
  }

  function renderResult(r) {
    show('resultPanel', true);
    document.getElementById('resultName').textContent = r.name;
    document.getElementById('resultMeta').textContent = r.category || '';

    const menuUrl = 'https://map.naver.com/v5/search/' + encodeURIComponent(r.name + ' 메뉴');

    document.getElementById('menuBtn').onclick = () => {
      window.open(menuUrl, '_blank');
    };

    document.getElementById('copyBtn').onclick = async () => {
      const txt = `[점심결과] ${r.name}\n- 카테고리: ${r.category||''}\n- 메뉴판: ${menuUrl}`;
      try { await navigator.clipboard.writeText(txt); alert('복사 완료'); }
      catch { alert(txt); }
    };
    document.getElementById('backHome').onclick = () => show('resultPanel', false);
  }

  document.getElementById('startBtn').onclick = spinAndResult;
  document.getElementById('quickBtn').onclick = () => { show('resultPanel', false); const r=rand(); if (r) renderResult(r); };

  load();
</script>
</body>
</html>
