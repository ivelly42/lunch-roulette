<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>점심 룰렛</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #f7f7f8; color:#0b0c10; }
    .wrap { max-width: 640px; margin: 0 auto; padding: 24px 16px; }
    .hero { border:1px solid #e7e7ea; border-radius:18px; background:#fff; padding:18px; display:flex; flex-direction:column; gap:10px; }
    .hero p { margin:0; line-height:1.35; white-space:pre-line; font-weight: 700; }
    .count { font-weight: 600; color:#ff4d4f; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    button { cursor:pointer; border: 1px solid #e6e8eb; background:#fff; border-radius:14px; padding:10px 12px; font-weight:600; }
    button.primary { background:#111; border-color:#111; color:#fff;}
    button:disabled { opacity:0.5; cursor:not-allowed; }
    .pipe{ font-weight:700; color:#999; }
    .panel { margin-top:12px; border:1px solid #e7e7ea; border-radius:18px; background:#fff; padding:16px; display:none; }
    .tags { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
    .tag { display:inline-flex; gap:8px; align-items:center; padding:8px 10px; border:1px solid #e7e7ea; border-radius:999px; background:#fbfbfc; font-size:13px;}
    .x{ font-weight:800; cursor:pointer; opacity:0.6; }
    .list{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .list button{ font-weight:500; }
    .wheel { border:1px dashed #e7e7ea; border-radius:18px; background:#fff; padding:24px; text-align:center; display:none; min-height:120px; }
    .result { border:1px solid #e7e7ea; border-radius:18px; background:#fff; padding:16px; margin-top:12px; display:none; }
    .result h2{ margin:0; font-size:20px;}
    .meta{ margin-top:6px; color:#666; font-size:13px; }
    .menu{ margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <p>최후의 만찬
운명의 원판이 깨어난다
망설임을 거두어라.
<span class="count" id="countText">-</span>개의 선택지 가운데,
원판이 답할 것이다.</p>
    <div class="actions">
      <button class="primary" id="startBtn">운명의 시간 시작</button>
      <button id="configBtn">조건 설정</button>
      <span class="pipe">|</span>
      <button id="quickBtn">빠르게 결과 보기</button>
    </div>
  </div>

  <div class="panel" id="configPanel">
    <div style="font-weight:700;">조건 설정</div>
    <div class="tags" id="summaryTags"></div>
    <div class="list" id="catButtons"></div>
    <div style="margin-top:12px; font-weight:700;">제외(클릭)</div>
    <div class="list" id="excludeButtons"></div>
  </div>

  <div class="wheel" id="wheelPanel"><div id="wheelName" style="font-weight:700;"></div></div>

  <div class="result" id="resultPanel">
    <h2 id="resultName"></h2>
    <div class="meta" id="resultMeta"></div>
    <div id="resultSummary"></div>
    <div class="menu" id="menuButtons"></div>
    <div class="actions" style="margin-top:12px;">
      <button id="menuBtn">메뉴판 보기</button>
      <button id="copyBtn">결과 복사</button>
      <button id="resetBtn">처음으로</button>
    </div>
  </div>
</div>
<script>
  const state = { category:"전체", excluded:new Set() };
  let all=[], filt=[];
  const dom = id => document.getElementById(id);
  function menuUrl(name){ return `https://map.naver.com/v5/search/${encodeURIComponent(name+" 메뉴")}`; }
  function apply(){
     filt = all.filter(r=>{
        if(state.category!=="전체" && r.category!==state.category) return false;
        if(state.excluded.has(r.id)) return false;
        return true;
     });
     dom("countText").textContent = filt.length;
     renderSummary(); renderCats(); renderExclude();
  }
  function renderSummary(){
     const el = dom("summaryTags");
     el.innerHTML="";
     const tags=[
       {k:"카테고리",v:state.category, click:()=>{state.category="전체"; apply();}},
       {k:"제외",v:`${state.excluded.size}개`, click:()=>{state.excluded.clear(); apply();}},
     ];
     tags.forEach(t=>{
       const d=document.createElement("span");
       d.className="tag";
       d.innerHTML=`<span style="color:#666;">${t.k}</span> ${t.v} <span class="x">✕</span>`;
       d.querySelector(".x").onclick=t.click;
       el.appendChild(d);
     });
  }
  function renderCats(){
     const cats = new Set(["전체"]);
     all.forEach(r=>cats.add(r.category||"기타"));
     const el=dom("catButtons");
     el.innerHTML="";
     [...cats].forEach(c=>{
        const b=document.createElement("button");
        b.textContent=c;
        if(c===state.category) b.style.borderColor="#111";
        b.onclick=()=>{state.category=c; apply();};
        el.appendChild(b);
     });
  }
  function renderExclude(){
     const el=dom("excludeButtons");
     el.innerHTML="";
     all.slice(0,60).forEach(r=>{
        const b=document.createElement("button");
        b.textContent=r.name;
        b.onclick=()=>{state.excluded.add(r.id); apply();};
        el.appendChild(b);
     });
  }
  function rand(){ return filt[Math.floor(Math.random()*filt.length)] || null; }
  async function spin(){
     if(!filt.length){ alert("선택지가 없습니다."); return; }
     hidePanels(); show("wheelPanel",true);
     for(let i=0;i<20;i++){
        dom("wheelName").textContent=rand().name;
        await new Promise(res=>setTimeout(res,80+i*15));
     }
     show("wheelPanel",false);
     showResult(rand());
  }
  function showResult(r){
     if(!r) return;
     show("resultPanel",true);
     dom("resultName").textContent=r.name;
     dom("resultMeta").textContent=r.category||"";
     dom("resultSummary").textContent=r.summary||"";
     const m=dom("menuButtons"); m.innerHTML="";
     (r.menuItems||[]).slice(0,6).forEach(it=>{
        const b=document.createElement("button"); b.textContent=it;
        m.appendChild(b);
     });
     dom("menuBtn").onclick=()=>window.open(r.menuUrl||menuUrl(r.name),"_blank");
     dom("copyBtn").onclick=async ()=>{
        const txt = `[점심결과] ${r.name}\n- ${r.category||""}\n- 메뉴판: ${r.menuUrl||menuUrl(r.name)}`;
        try{ await navigator.clipboard.writeText(txt);}catch{prompt("복사해주세요",txt);} };
     dom("resetBtn").onclick=()=>{ show("resultPanel",false); };
  }
  function hidePanels(){ show("configPanel",false); show("wheelPanel",false); show("resultPanel",false); }
  function show(id,on){ dom(id).style.display=on?"block":"none"; }
  dom("startBtn").onclick=spin;
  dom("quickBtn").onclick=()=>showResult(rand());
  dom("configBtn").onclick=()=>{
     const vis = dom("configPanel").style.display==="block";
     dom("configPanel").style.display = vis ? "none" : "block";
  };
  fetch("restaurants.json").then(r=>r.json()).then(list=>{ all=list; apply(); });
</script>
</body>
</html>
